name: Market Data Snapshot

on:
  workflow_dispatch:          # manual trigger only

permissions:
  contents: write

concurrency:
  group: market-snapshot-${{ github.ref }}
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch market snapshot
        run: python scripts/fetch_market_snapshot.py

      - name: Commit snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/market_snapshot.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: market data snapshot $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
