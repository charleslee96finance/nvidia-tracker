name: Update SPCX Scorecard

on:
  schedule:
    - cron: '0 2 * * *'      # daily at 02:00 UTC = 10:00 Beijing time
  workflow_dispatch:          # allow manual trigger
  push:
    branches: [main]
    paths:
      - 'update_spcx.py'
      - '.github/workflows/spcx.yml'

permissions:
  contents: write

concurrency:
  group: spcx-update
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Run SPCX updater
        run: python update_spcx.py

      - name: Commit spcx.html + baseline
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add spcx.html data/spcx_baseline.json
          if git diff --cached --quiet; then
            echo "No changes to commit."
          else
            git commit -m "auto: refresh spcx scorecard $(date -u +'%Y-%m-%d %H:%MZ')"
            git push
          fi
