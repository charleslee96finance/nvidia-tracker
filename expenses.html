<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clear Glass · Monthly Expenses</title>
<style>
  :root {
    --glass-bg: rgba(255, 255, 255, 0.14);
    --glass-border: rgba(255, 255, 255, 0.28);
    --glass-hi: rgba(255, 255, 255, 0.55);
    --text: #f4f7ff;
    --text-dim: rgba(244, 247, 255, 0.68);
    --accent: #7fd8ff;
    --danger: #ff8aa6;
    --radius: 20px;
    --blur: 22px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body { height: 100%; }

  body {
    font-family: "Segoe UI", -apple-system, BlinkMacSystemFont, Roboto, Helvetica, Arial, sans-serif;
    color: var(--text);
    min-height: 100vh;
    padding: 32px 18px 64px;
    background:
      radial-gradient(1200px 800px at 12% -10%, #6a5cff 0%, transparent 55%),
      radial-gradient(1000px 700px at 110% 10%, #2bd6c9 0%, transparent 50%),
      radial-gradient(900px 900px at 50% 120%, #ff7ac6 0%, transparent 55%),
      linear-gradient(160deg, #1b2050 0%, #161a38 60%, #0e1124 100%);
    background-attachment: fixed;
  }

  /* floating ambient orbs for depth */
  body::before, body::after {
    content: "";
    position: fixed;
    border-radius: 50%;
    filter: blur(40px);
    opacity: 0.5;
    z-index: -1;
    pointer-events: none;
  }
  body::before { width: 320px; height: 320px; top: 8%; right: 6%; background: rgba(127,216,255,0.6); }
  body::after  { width: 280px; height: 280px; bottom: 6%; left: 4%; background: rgba(255,122,198,0.55); }

  .wrap { max-width: 880px; margin: 0 auto; }

  header.app {
    text-align: center;
    margin-bottom: 28px;
  }
  header.app h1 {
    font-size: 32px;
    font-weight: 700;
    letter-spacing: 0.5px;
    text-shadow: 0 2px 18px rgba(0,0,0,0.25);
  }
  header.app p {
    color: var(--text-dim);
    margin-top: 6px;
    font-size: 14.5px;
  }

  /* Frosted glass surface */
  .glass {
    background: var(--glass-bg);
    border: 1px solid var(--glass-border);
    border-radius: var(--radius);
    backdrop-filter: blur(var(--blur)) saturate(160%);
    -webkit-backdrop-filter: blur(var(--blur)) saturate(160%);
    box-shadow:
      0 8px 32px rgba(8, 10, 30, 0.35),
      inset 0 1px 0 var(--glass-hi);
  }

  .summary {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat { padding: 20px 18px; }
  .stat .label { font-size: 12.5px; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
  .stat .value { font-size: 26px; font-weight: 700; margin-top: 8px; }
  .stat .value.accent { color: var(--accent); }

  .card { padding: 22px; margin-bottom: 24px; }
  .card h2 { font-size: 16px; font-weight: 600; margin-bottom: 16px; letter-spacing: 0.3px; }

  form .row {
    display: grid;
    grid-template-columns: 1.4fr 1fr 1fr 1.2fr auto;
    gap: 12px;
    align-items: end;
  }
  .field { display: flex; flex-direction: column; gap: 6px; }
  .field label { font-size: 12px; color: var(--text-dim); letter-spacing: 0.4px; }

  input, select {
    width: 100%;
    padding: 11px 12px;
    font-size: 14px;
    color: var(--text);
    background: rgba(255,255,255,0.10);
    border: 1px solid rgba(255,255,255,0.22);
    border-radius: 12px;
    outline: none;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }
  input::placeholder { color: rgba(244,247,255,0.45); }
  input:focus, select:focus {
    border-color: var(--accent);
    background: rgba(255,255,255,0.16);
    box-shadow: 0 0 0 3px rgba(127,216,255,0.18);
  }
  select option { color: #1b2050; }

  button {
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    font-weight: 600;
    color: #0e1124;
    padding: 11px 20px;
    border: none;
    border-radius: 12px;
    background: linear-gradient(135deg, #aef0ff, #7fd8ff);
    box-shadow: 0 6px 18px rgba(127,216,255,0.35);
    transition: transform 0.12s, box-shadow 0.12s, opacity 0.12s;
    white-space: nowrap;
  }
  button:hover { transform: translateY(-1px); box-shadow: 0 9px 22px rgba(127,216,255,0.45); }
  button:active { transform: translateY(0); }

  /* Month groups */
  .month { margin-bottom: 18px; padding: 18px 20px; }
  .month-head {
    display: flex;
    justify-content: space-between;
    align-items: baseline;
    margin-bottom: 12px;
    padding-bottom: 12px;
    border-bottom: 1px solid rgba(255,255,255,0.16);
  }
  .month-head .m-name { font-size: 17px; font-weight: 600; }
  .month-head .m-total { font-size: 18px; font-weight: 700; color: var(--accent); }

  .item {
    display: grid;
    grid-template-columns: auto 1fr auto auto;
    gap: 12px;
    align-items: center;
    padding: 10px 4px;
    border-bottom: 1px solid rgba(255,255,255,0.07);
  }
  .item:last-child { border-bottom: none; }
  .tag {
    font-size: 11.5px;
    padding: 4px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.14);
    border: 1px solid rgba(255,255,255,0.2);
    white-space: nowrap;
  }
  .item .desc { font-size: 14.5px; }
  .item .desc small { display: block; color: var(--text-dim); font-size: 12px; margin-top: 2px; }
  .item .amt { font-size: 15px; font-weight: 600; text-align: right; }
  .item .del {
    background: rgba(255,138,166,0.16);
    color: var(--danger);
    border: 1px solid rgba(255,138,166,0.35);
    box-shadow: none;
    padding: 6px 11px;
    font-size: 13px;
    border-radius: 9px;
  }
  .item .del:hover { background: rgba(255,138,166,0.28); transform: none; box-shadow: none; }

  .empty { text-align: center; color: var(--text-dim); padding: 36px 12px; font-size: 15px; }

  footer.app { text-align: center; color: var(--text-dim); font-size: 12.5px; margin-top: 30px; }

  @media (max-width: 720px) {
    form .row { grid-template-columns: 1fr 1fr; }
    form .row .field.full, form .row button { grid-column: 1 / -1; }
    .summary { grid-template-columns: 1fr; }
    .item { grid-template-columns: 1fr auto; grid-template-areas: "tag amt" "desc del"; }
    .item .tag { grid-area: tag; justify-self: start; }
    .item .desc { grid-area: desc; }
    .item .amt { grid-area: amt; }
    .item .del { grid-area: del; justify-self: end; }
  }
</style>
</head>
<body>
  <div class="wrap">
    <header class="app">
      <h1>Clear Glass · Expenses</h1>
      <p>Record what you spend, every month — saved right in your browser.</p>
    </header>

    <section class="summary">
      <div class="stat glass">
        <div class="label">This Month</div>
        <div class="value accent" id="statMonth">$0.00</div>
      </div>
      <div class="stat glass">
        <div class="label">Tracked Total</div>
        <div class="value" id="statTotal">$0.00</div>
      </div>
      <div class="stat glass">
        <div class="label">Entries</div>
        <div class="value" id="statCount">0</div>
      </div>
    </section>

    <section class="card glass">
      <h2>Add an expense</h2>
      <form id="expenseForm" autocomplete="off">
        <div class="row">
          <div class="field full">
            <label for="desc">Description</label>
            <input type="text" id="desc" placeholder="e.g. Groceries" required>
          </div>
          <div class="field">
            <label for="amount">Amount</label>
            <input type="number" id="amount" step="0.01" min="0" placeholder="0.00" required>
          </div>
          <div class="field">
            <label for="category">Category</label>
            <select id="category">
              <option>Food</option>
              <option>Transport</option>
              <option>Housing</option>
              <option>Utilities</option>
              <option>Shopping</option>
              <option>Health</option>
              <option>Entertainment</option>
              <option>Other</option>
            </select>
          </div>
          <div class="field">
            <label for="date">Date</label>
            <input type="date" id="date" required>
          </div>
          <button type="submit">Add</button>
        </div>
      </form>
    </section>

    <section id="list"></section>

    <footer class="app">
      Data is stored locally on this device. Clearing your browser data will remove it.
    </footer>
  </div>

<script>
(function () {
  "use strict";
  var STORAGE_KEY = "clearGlassExpenses";

  /** @type {{id:string, desc:string, amount:number, category:string, date:string}[]} */
  var expenses = load();

  var form = document.getElementById("expenseForm");
  var listEl = document.getElementById("list");
  var dateInput = document.getElementById("date");

  // default date = today
  dateInput.value = new Date().toISOString().slice(0, 10);

  function load() {
    try {
      var raw = localStorage.getItem(STORAGE_KEY);
      return raw ? JSON.parse(raw) : [];
    } catch (e) {
      return [];
    }
  }

  function save() {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(expenses));
  }

  function money(n) {
    return "$" + n.toLocaleString(undefined, { minimumFractionDigits: 2, maximumFractionDigits: 2 });
  }

  function monthKey(dateStr) {
    return dateStr.slice(0, 7); // YYYY-MM
  }

  function monthLabel(key) {
    var parts = key.split("-");
    var d = new Date(parseInt(parts[0], 10), parseInt(parts[1], 10) - 1, 1);
    return d.toLocaleDateString(undefined, { month: "long", year: "numeric" });
  }

  function escapeHtml(s) {
    return s.replace(/[&<>"']/g, function (c) {
      return { "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c];
    });
  }

  function render() {
    // ---- summary stats ----
    var nowKey = new Date().toISOString().slice(0, 7);
    var total = 0, monthTotal = 0;
    expenses.forEach(function (e) {
      total += e.amount;
      if (monthKey(e.date) === nowKey) monthTotal += e.amount;
    });
    document.getElementById("statMonth").textContent = money(monthTotal);
    document.getElementById("statTotal").textContent = money(total);
    document.getElementById("statCount").textContent = String(expenses.length);

    // ---- grouped list ----
    if (expenses.length === 0) {
      listEl.innerHTML = '<div class="card glass empty">No expenses yet — add your first one above.</div>';
      return;
    }

    // group by month
    var groups = {};
    expenses.forEach(function (e) {
      var k = monthKey(e.date);
      (groups[k] = groups[k] || []).push(e);
    });

    // newest month first
    var keys = Object.keys(groups).sort().reverse();
    var html = "";

    keys.forEach(function (k) {
      var items = groups[k].slice().sort(function (a, b) {
        return a.date < b.date ? 1 : a.date > b.date ? -1 : 0;
      });
      var sub = items.reduce(function (s, e) { return s + e.amount; }, 0);

      html += '<div class="month glass">';
      html += '<div class="month-head"><span class="m-name">' + monthLabel(k) +
              '</span><span class="m-total">' + money(sub) + '</span></div>';

      items.forEach(function (e) {
        html += '<div class="item">' +
          '<span class="tag">' + escapeHtml(e.category) + '</span>' +
          '<span class="desc">' + escapeHtml(e.desc) +
            '<small>' + e.date + '</small></span>' +
          '<span class="amt">' + money(e.amount) + '</span>' +
          '<button class="del" data-id="' + e.id + '" aria-label="Delete">Delete</button>' +
        '</div>';
      });

      html += '</div>';
    });

    listEl.innerHTML = html;
  }

  form.addEventListener("submit", function (ev) {
    ev.preventDefault();
    var amount = parseFloat(document.getElementById("amount").value);
    if (isNaN(amount) || amount < 0) return;

    expenses.push({
      id: String(Date.now()) + Math.random().toString(36).slice(2, 7),
      desc: document.getElementById("desc").value.trim() || "Expense",
      amount: amount,
      category: document.getElementById("category").value,
      date: dateInput.value || new Date().toISOString().slice(0, 10)
    });

    save();
    render();

    // reset for quick entry, keep date & category
    document.getElementById("desc").value = "";
    document.getElementById("amount").value = "";
    document.getElementById("desc").focus();
  });

  listEl.addEventListener("click", function (ev) {
    var btn = ev.target.closest(".del");
    if (!btn) return;
    var id = btn.getAttribute("data-id");
    expenses = expenses.filter(function (e) { return e.id !== id; });
    save();
    render();
  });

  render();
})();
</script>
</body>
</html>
