<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>Clear Glass · 月度消费记录</title>
<style>
  :root{
    --text:#fff;
    --text-dim:rgba(255,255,255,.78);
    --text-faint:rgba(255,255,255,.55);
    --glass:rgba(255,255,255,.12);
    --glass-strong:rgba(255,255,255,.2);
    --glass-border:rgba(255,255,255,.38);
    --glass-edge:rgba(255,255,255,.55);
    --radius:22px;
  }
  *{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
  html,body{min-height:100%;}
  body{
    font-family:'Inter',-apple-system,BlinkMacSystemFont,"Segoe UI","PingFang SC","Microsoft YaHei",sans-serif;
    color:var(--text);
    min-height:100vh;
    background:
      radial-gradient(600px 420px at 85% 4%, rgba(255,224,102,.55) 0%, transparent 60%),
      radial-gradient(560px 480px at 8% 30%, rgba(255,77,143,.4) 0%, transparent 60%),
      radial-gradient(620px 520px at 92% 78%, rgba(95,232,220,.4) 0%, transparent 60%),
      linear-gradient(160deg,#FF87B8 0%,#D080F0 26%,#9090F5 50%,#5FB0F0 75%,#8BE8C8 100%);
    background-attachment:fixed;
    padding:20px 16px calc(96px + env(safe-area-inset-bottom));
    -webkit-font-smoothing:antialiased;
  }
  .app{max-width:430px;margin:0 auto;}

  /* ---------- glass card ---------- */
  .card{
    background:var(--glass);
    border:1px solid var(--glass-border);
    border-radius:var(--radius);
    backdrop-filter:blur(18px) saturate(150%);
    -webkit-backdrop-filter:blur(18px) saturate(150%);
    box-shadow:0 8px 28px rgba(40,20,80,.18), inset 0 1px 0 var(--glass-edge);
    padding:18px;
    margin-bottom:14px;
  }

  .eyebrow{font-size:10.5px;font-weight:700;letter-spacing:2.5px;text-transform:uppercase;color:var(--text-dim);}
  .screen-title{font-size:26px;font-weight:800;letter-spacing:-.5px;margin-top:4px;}
  .screen-head{margin:2px 2px 16px;}

  /* ---------- amount ---------- */
  .amount-card{text-align:left;}
  .amount-row{display:flex;align-items:baseline;gap:8px;margin-top:10px;}
  .amount-row .cur{font-size:15px;font-weight:700;color:var(--text-dim);}
  #f-amount{
    flex:1;width:100%;background:transparent;border:none;outline:none;color:#fff;
    font-family:inherit;font-size:44px;font-weight:800;letter-spacing:-1.5px;caret-color:#fff;min-width:0;
  }
  #f-amount::placeholder{color:rgba(255,255,255,.35);}
  .amount-sub{font-size:11.5px;color:var(--text-faint);margin-top:6px;}

  .row2{display:flex;gap:12px;}
  .row2 .card{flex:1;padding:14px 16px;}
  .mini-label{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--text-faint);}
  .row2 input{
    width:100%;background:transparent;border:none;outline:none;color:#fff;
    font-family:inherit;font-size:15.5px;font-weight:600;margin-top:6px;color-scheme:dark;
  }

  /* ---------- categories ---------- */
  .cat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-top:12px;}
  .cat{
    background:rgba(255,255,255,.10);
    border:1px solid rgba(255,255,255,.3);
    border-radius:18px;
    padding:12px 6px 10px;
    text-align:center;cursor:pointer;
    transition:transform .15s,background .15s,box-shadow .15s;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
  }
  .cat .emoji{font-size:22px;display:block;}
  .cat .zh{font-size:13px;font-weight:700;margin-top:5px;}
  .cat .en{font-size:9.5px;letter-spacing:1px;color:var(--text-faint);text-transform:uppercase;margin-top:1px;}
  .cat.active{
    background:rgba(255,255,255,.92);color:#3c2a63;
    box-shadow:0 8px 20px rgba(30,10,70,.25);
    transform:translateY(-2px);
  }
  .cat.active .en{color:rgba(60,42,99,.55);}

  #f-note{
    width:100%;background:transparent;border:none;outline:none;color:#fff;
    font-family:inherit;font-size:14px;font-weight:500;margin-top:8px;
  }
  #f-note::placeholder{color:rgba(255,255,255,.4);}

  .save-btn{
    width:100%;padding:16px;border:none;border-radius:20px;cursor:pointer;
    font-family:inherit;font-size:16px;font-weight:800;letter-spacing:.5px;
    color:#5b3a8f;background:rgba(255,255,255,.94);
    box-shadow:0 10px 26px rgba(30,10,70,.3), inset 0 1px 0 #fff;
    transition:transform .15s,box-shadow .15s;
  }
  .save-btn:active{transform:scale(.97);}

  /* ---------- list ---------- */
  .total-card{display:flex;justify-content:space-between;align-items:center;gap:10px;background:var(--glass-strong);}
  .total-card .big{font-size:30px;font-weight:800;letter-spacing:-1px;margin-top:6px;}
  .total-card .big small{font-size:15px;font-weight:700;color:var(--text-dim);margin-right:4px;}
  .total-card .right{text-align:right;}
  .total-card .right .num{font-size:26px;font-weight:800;}
  .month-nav{display:flex;align-items:center;gap:8px;}
  .month-nav button{
    width:34px;height:34px;border-radius:50%;border:1px solid var(--glass-border);
    background:var(--glass);color:#fff;cursor:pointer;font-size:15px;line-height:1;
    backdrop-filter:blur(8px);
  }
  .chips{display:flex;gap:8px;overflow-x:auto;padding:2px 2px 10px;scrollbar-width:none;}
  .chips::-webkit-scrollbar{display:none;}
  .chip{
    flex-shrink:0;padding:7px 14px;border-radius:999px;font-size:12.5px;font-weight:700;
    background:rgba(255,255,255,.14);border:1px solid rgba(255,255,255,.32);color:#fff;cursor:pointer;
  }
  .chip.active{background:rgba(255,255,255,.92);color:#3c2a63;}
  .day-head{display:flex;justify-content:space-between;align-items:baseline;margin:14px 4px 8px;}
  .day-head .d{font-size:13.5px;font-weight:700;}
  .day-head .t{font-size:12.5px;font-weight:700;color:var(--text-dim);}
  .entry{
    display:flex;align-items:center;gap:12px;
    background:var(--glass);border:1px solid rgba(255,255,255,.3);border-radius:18px;
    padding:12px 14px;margin-bottom:8px;
    box-shadow:inset 0 1px 0 rgba(255,255,255,.35);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
  }
  .entry .ico{
    width:38px;height:38px;border-radius:12px;flex-shrink:0;
    display:flex;align-items:center;justify-content:center;font-size:19px;
    background:rgba(255,255,255,.9);box-shadow:0 4px 12px rgba(30,10,70,.18);
  }
  .entry .mid{flex:1;min-width:0;}
  .entry .name{font-size:14px;font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .entry .meta{font-size:11px;color:var(--text-faint);margin-top:2px;}
  .entry .amt{font-size:15.5px;font-weight:800;letter-spacing:-.3px;}
  .entry .del{
    border:none;background:rgba(255,255,255,.16);color:rgba(255,255,255,.85);
    width:26px;height:26px;border-radius:50%;cursor:pointer;font-size:13px;line-height:1;flex-shrink:0;
  }
  .empty{text-align:center;color:var(--text-dim);padding:40px 10px;font-size:14px;}

  /* ---------- stats ---------- */
  .stat-hero .big{font-size:40px;font-weight:800;letter-spacing:-1.5px;margin-top:8px;}
  .stat-hero .big small{font-size:18px;font-weight:700;color:var(--text-dim);margin-right:5px;}
  .stat-cols{display:flex;margin-top:14px;border-top:1px solid rgba(255,255,255,.22);padding-top:12px;}
  .stat-cols>div{flex:1;}
  .stat-cols>div+div{border-left:1px solid rgba(255,255,255,.22);padding-left:14px;}
  .stat-cols .v{font-size:17px;font-weight:800;margin-top:3px;}
  .bars{display:flex;align-items:flex-end;gap:3px;height:110px;margin-top:12px;}
  .bars .b{flex:1;background:rgba(255,255,255,.85);border-radius:3px 3px 0 0;min-height:2px;transition:height .5s cubic-bezier(.22,.61,.36,1);}
  .bars .b.dim{background:rgba(255,255,255,.28);}
  .bars-x{display:flex;justify-content:space-between;font-size:9.5px;color:var(--text-faint);margin-top:6px;}
  .cat-row{display:flex;align-items:center;gap:10px;padding:9px 0;}
  .cat-row .e{font-size:16px;width:24px;text-align:center;}
  .cat-row .n{width:52px;font-size:12.5px;font-weight:700;}
  .cat-row .track{flex:1;height:9px;border-radius:5px;background:rgba(255,255,255,.18);overflow:hidden;}
  .cat-row .fill{height:100%;border-radius:5px;background:rgba(255,255,255,.9);transform-origin:left;animation:grow .6s cubic-bezier(.22,.61,.36,1) both;}
  @keyframes grow{from{transform:scaleX(0);}to{transform:scaleX(1);}}
  .cat-row .a{font-size:12px;font-weight:700;min-width:70px;text-align:right;}

  /* ---------- bottom nav ---------- */
  .nav{
    position:fixed;left:50%;transform:translateX(-50%);
    bottom:calc(14px + env(safe-area-inset-bottom));
    display:flex;gap:6px;padding:6px;z-index:50;
    background:rgba(255,255,255,.16);
    border:1px solid rgba(255,255,255,.4);
    border-radius:999px;
    backdrop-filter:blur(20px) saturate(160%);
    -webkit-backdrop-filter:blur(20px) saturate(160%);
    box-shadow:0 10px 30px rgba(30,10,70,.3), inset 0 1px 0 rgba(255,255,255,.5);
  }
  .nav button{
    border:none;background:transparent;color:rgba(255,255,255,.85);cursor:pointer;
    font-family:inherit;font-size:13.5px;font-weight:700;
    padding:10px 22px;border-radius:999px;transition:all .2s;
  }
  .nav button.active{background:rgba(255,255,255,.94);color:#3c2a63;box-shadow:0 4px 14px rgba(30,10,70,.25);}

  .toast{
    position:fixed;bottom:calc(84px + env(safe-area-inset-bottom));left:50%;transform:translateX(-50%);
    background:rgba(30,20,60,.82);color:#fff;padding:10px 20px;border-radius:20px;
    font-size:13px;font-weight:600;opacity:0;transition:opacity .3s;pointer-events:none;z-index:99;
    backdrop-filter:blur(10px);
  }
  .toast.show{opacity:1;}

  section[hidden]{display:none;}
  .fade-in{animation:fade .4s cubic-bezier(.22,.61,.36,1) both;}
  @keyframes fade{from{opacity:0;transform:translateY(12px);}to{opacity:1;transform:none;}}
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>
<body>
<div class="app">

  <!-- ============ 录入 Add ============ -->
  <section id="scr-add">
    <div class="screen-head fade-in">
      <div class="eyebrow">New Entry · 新增</div>
      <div class="screen-title">添加一笔消费</div>
    </div>

    <div class="card amount-card fade-in">
      <div class="mini-label">Amount · 金额</div>
      <div class="amount-row">
        <span class="cur">RM</span>
        <input id="f-amount" type="number" inputmode="decimal" step="0.01" min="0" placeholder="0.00">
      </div>
      <div class="amount-sub" id="usd-hint">≈ USD 0.00 · today</div>
    </div>

    <div class="row2 fade-in">
      <div class="card">
        <div class="mini-label">Date · 日期</div>
        <input id="f-date" type="date">
      </div>
      <div class="card">
        <div class="mini-label">Time · 时间</div>
        <input id="f-time" type="time">
      </div>
    </div>

    <div class="card fade-in">
      <div class="mini-label">Category · 分类</div>
      <div class="cat-grid" id="cat-grid"></div>
    </div>

    <div class="card fade-in">
      <div class="mini-label">Note · 备注</div>
      <input id="f-note" type="text" placeholder="商家、商品…（可不填）">
    </div>

    <button class="save-btn fade-in" id="btn-save">保存 · Save</button>
  </section>

  <!-- ============ 明细 List ============ -->
  <section id="scr-list" hidden>
    <div class="screen-head fade-in">
      <div class="eyebrow">All Entries · 明细</div>
      <div class="screen-title" style="display:flex;justify-content:space-between;align-items:center;">
        <span id="list-month-label">—</span>
        <span class="month-nav">
          <button id="m-prev" aria-label="上个月">‹</button>
          <button id="m-next" aria-label="下个月">›</button>
        </span>
      </div>
    </div>

    <div class="card total-card fade-in">
      <div>
        <div class="mini-label">Month Total · 月支出</div>
        <div class="big"><small>RM</small><span id="list-total">0.00</span></div>
      </div>
      <div class="right">
        <div class="mini-label">Entries · 笔数</div>
        <div class="num" id="list-count">0</div>
      </div>
    </div>

    <div class="chips fade-in" id="chip-row"></div>
    <div id="list-body"></div>
  </section>

  <!-- ============ 统计 Stats ============ -->
  <section id="scr-stats" hidden>
    <div class="screen-head fade-in">
      <div class="eyebrow">Overview · 概览</div>
      <div class="screen-title" id="stats-month-label">—</div>
    </div>

    <div class="card stat-hero fade-in">
      <div class="mini-label">Total Spent · 总支出</div>
      <div class="big"><small>RM</small><span id="st-total">0.00</span></div>
      <div class="stat-cols">
        <div><div class="mini-label">Per Day</div><div class="v" id="st-perday">RM 0.00</div></div>
        <div><div class="mini-label">Entries</div><div class="v" id="st-count">0</div></div>
        <div><div class="mini-label">Max</div><div class="v" id="st-max">RM 0.00</div></div>
      </div>
    </div>

    <div class="card fade-in">
      <div class="mini-label">Daily · 每日趋势</div>
      <div class="bars" id="daily-bars"></div>
      <div class="bars-x"><span id="bx-first">1</span><span id="bx-mid">15</span><span id="bx-last">30</span></div>
    </div>

    <div class="card fade-in">
      <div class="mini-label">By Category · 按分类</div>
      <div id="cat-breakdown" style="margin-top:6px;"></div>
    </div>
  </section>
</div>

<nav class="nav">
  <button class="active" data-scr="add">录入</button>
  <button data-scr="list">明细</button>
  <button data-scr="stats">统计</button>
</nav>

<div class="toast" id="toast"></div>

<script>
'use strict';
const CATS = [
  { zh:'餐饮', en:'Food',    emoji:'🍜' },
  { zh:'交通', en:'Transit', emoji:'🚗' },
  { zh:'购物', en:'Shop',    emoji:'🛍️' },
  { zh:'日常', en:'Daily',   emoji:'🧺' },
  { zh:'娱乐', en:'Fun',     emoji:'🎬' },
  { zh:'其他', en:'Other',   emoji:'✨' },
];
const KEY = 'clear_glass_records_v1';
const USD_RATE = 4.72; // RM per USD, indicative only

let records = load();
let selCat = CATS[0].zh;
let listMonth = thisMonth();   // 'YYYY-MM' shown on 明细/统计
let chipFilter = '';           // '' = all

function load(){ try{ return JSON.parse(localStorage.getItem(KEY)||'[]'); }catch(e){ return []; } }
function save(){ localStorage.setItem(KEY, JSON.stringify(records)); }
function money(n){ return Number(n).toLocaleString('en-MY',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function today(){ const d=new Date(); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0'); }
function nowTime(){ const d=new Date(); return String(d.getHours()).padStart(2,'0')+':'+String(d.getMinutes()).padStart(2,'0'); }
function thisMonth(){ return today().slice(0,7); }
function monthLabel(m){ const [y,mo]=m.split('-'); return new Date(y,mo-1,1).toLocaleDateString('en-US',{month:'long',year:'numeric'}); }
function dayLabel(dateStr){
  if(dateStr===today()) return 'Today · 今天';
  const d=new Date(dateStr+'T00:00:00');
  const yd=new Date(); yd.setDate(yd.getDate()-1);
  if(dateStr===yd.toISOString().slice(0,10)) return 'Yesterday · 昨天';
  return d.toLocaleDateString('en-US',{month:'short',day:'numeric'})+' · '+['周日','周一','周二','周三','周四','周五','周六'][d.getDay()];
}
function catOf(zh){ return CATS.find(c=>c.zh===zh)||CATS[CATS.length-1]; }
function esc(s){ return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
function toast(msg){
  const t=document.getElementById('toast');
  t.textContent=msg; t.classList.add('show');
  clearTimeout(toast._h); toast._h=setTimeout(()=>t.classList.remove('show'),1600);
}

/* ---------- nav ---------- */
document.querySelectorAll('.nav button').forEach(b=>{
  b.addEventListener('click',()=>{
    document.querySelectorAll('.nav button').forEach(x=>x.classList.remove('active'));
    b.classList.add('active');
    ['add','list','stats'].forEach(s=>document.getElementById('scr-'+s).hidden = s!==b.dataset.scr);
    replayFade('scr-'+b.dataset.scr);
    if(b.dataset.scr==='list') renderList();
    if(b.dataset.scr==='stats') renderStats();
  });
});
function replayFade(id){
  document.querySelectorAll('#'+id+' .fade-in').forEach((el,i)=>{
    el.style.animation='none'; void el.offsetWidth;
    el.style.animation=''; el.style.animationDelay=(i*0.05)+'s';
  });
}

/* ---------- add screen ---------- */
function renderCats(){
  document.getElementById('cat-grid').innerHTML = CATS.map(c=>`
    <div class="cat${c.zh===selCat?' active':''}" data-cat="${c.zh}">
      <span class="emoji">${c.emoji}</span>
      <span class="zh">${c.zh}</span>
      <div class="en">${c.en}</div>
    </div>`).join('');
  document.querySelectorAll('.cat').forEach(el=>{
    el.addEventListener('click',()=>{ selCat=el.dataset.cat; renderCats(); });
  });
}
document.getElementById('f-amount').addEventListener('input',e=>{
  const v=parseFloat(e.target.value);
  document.getElementById('usd-hint').textContent='≈ USD '+money(v>0? v/USD_RATE : 0)+' · today';
});
document.getElementById('btn-save').addEventListener('click',()=>{
  const amount=parseFloat(document.getElementById('f-amount').value);
  if(!amount||amount<=0){ toast('请输入金额'); return; }
  const date=document.getElementById('f-date').value||today();
  records.push({
    id:Date.now()+'-'+Math.random().toString(36).slice(2,7),
    date, time:document.getElementById('f-time').value||nowTime(),
    amount, category:selCat,
    note:document.getElementById('f-note').value.trim(),
    createdAt:new Date().toISOString(),
  });
  save();
  toast('已保存 RM '+money(amount));
  document.getElementById('f-amount').value='';
  document.getElementById('f-note').value='';
  document.getElementById('usd-hint').textContent='≈ USD 0.00 · today';
  listMonth=date.slice(0,7);
});

/* ---------- list screen ---------- */
function monthRecords(m){ return records.filter(r=>r.date.slice(0,7)===m); }
function shiftMonth(m,delta){ const [y,mo]=m.split('-').map(Number); const d=new Date(y,mo-1+delta,1); return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0'); }
document.getElementById('m-prev').addEventListener('click',()=>{ listMonth=shiftMonth(listMonth,-1); renderList(); });
document.getElementById('m-next').addEventListener('click',()=>{ listMonth=shiftMonth(listMonth, 1); renderList(); });

function renderList(){
  document.getElementById('list-month-label').textContent=monthLabel(listMonth);
  const recs=monthRecords(listMonth);
  document.getElementById('list-total').textContent=money(recs.reduce((s,r)=>s+r.amount,0));
  document.getElementById('list-count').textContent=recs.length;

  // chips
  const usedCats=[...new Set(recs.map(r=>r.category))];
  document.getElementById('chip-row').innerHTML =
    `<span class="chip${chipFilter===''?' active':''}" data-c="">All · 全部</span>`+
    usedCats.map(c=>`<span class="chip${chipFilter===c?' active':''}" data-c="${c}">${c}</span>`).join('');
  document.querySelectorAll('.chip').forEach(ch=>{
    ch.addEventListener('click',()=>{ chipFilter=ch.dataset.c; renderList(); });
  });

  const shown=recs.filter(r=>!chipFilter||r.category===chipFilter)
    .sort((a,b)=> b.date.localeCompare(a.date) || (b.time||'').localeCompare(a.time||''));
  const body=document.getElementById('list-body');
  if(!shown.length){ body.innerHTML='<div class="card empty">这个月还没有记录 · No entries yet</div>'; return; }

  const byDay={};
  shown.forEach(r=>{ (byDay[r.date]=byDay[r.date]||[]).push(r); });
  body.innerHTML=Object.keys(byDay).sort().reverse().map(d=>{
    const items=byDay[d];
    const dayTotal=items.reduce((s,r)=>s+r.amount,0);
    return `<div class="day-head"><span class="d">${dayLabel(d)}</span><span class="t">RM ${money(dayTotal)}</span></div>`+
      items.map(r=>`
        <div class="entry">
          <div class="ico">${catOf(r.category).emoji}</div>
          <div class="mid">
            <div class="name">${esc(r.note||r.category)}</div>
            <div class="meta">${r.category} · ${r.time||''}</div>
          </div>
          <div class="amt">${money(r.amount)}</div>
          <button class="del" data-id="${r.id}" aria-label="删除">×</button>
        </div>`).join('');
  }).join('');
  body.querySelectorAll('.del').forEach(b=>{
    b.addEventListener('click',()=>{
      records=records.filter(r=>r.id!==b.dataset.id);
      save(); toast('已删除'); renderList();
    });
  });
}

/* ---------- stats screen ---------- */
function renderStats(){
  document.getElementById('stats-month-label').textContent=monthLabel(listMonth);
  const recs=monthRecords(listMonth);
  const total=recs.reduce((s,r)=>s+r.amount,0);
  const [y,mo]=listMonth.split('-').map(Number);
  const daysInMonth=new Date(y,mo,0).getDate();
  const isCur=listMonth===thisMonth();
  const elapsed=isCur? new Date().getDate() : daysInMonth;
  const maxRec=recs.reduce((m,r)=>r.amount>(m?m.amount:0)?r:m,null);

  document.getElementById('st-total').textContent=money(total);
  document.getElementById('st-perday').textContent='RM '+money(total/(elapsed||1));
  document.getElementById('st-count').textContent=recs.length;
  document.getElementById('st-max').textContent='RM '+money(maxRec?maxRec.amount:0);

  // daily bars
  const perDay=Array(daysInMonth).fill(0);
  recs.forEach(r=>{ perDay[parseInt(r.date.slice(8),10)-1]+=r.amount; });
  const peak=Math.max(...perDay,1);
  document.getElementById('daily-bars').innerHTML=perDay.map((v,i)=>
    `<div class="b${v===0?' dim':''}" style="height:${v===0?3:Math.max(6,v/peak*100)}%" title="${i+1}日 RM ${money(v)}"></div>`).join('');
  document.getElementById('bx-first').textContent=monthLabel(listMonth).split(' ')[0].slice(0,3)+' 1';
  document.getElementById('bx-mid').textContent='15';
  document.getElementById('bx-last').textContent=String(daysInMonth);

  // category breakdown
  const byCat={};
  recs.forEach(r=>{ byCat[r.category]=(byCat[r.category]||0)+r.amount; });
  const entries=Object.entries(byCat).sort((a,b)=>b[1]-a[1]);
  const bd=document.getElementById('cat-breakdown');
  if(!entries.length){ bd.innerHTML='<div class="empty" style="padding:20px;">本月暂无数据</div>'; return; }
  const top=entries[0][1];
  bd.innerHTML=entries.map(([zh,amt],i)=>`
    <div class="cat-row">
      <span class="e">${catOf(zh).emoji}</span>
      <span class="n">${zh}</span>
      <div class="track"><div class="fill" style="width:${amt/top*100}%;animation-delay:${i*0.08}s"></div></div>
      <span class="a">RM ${money(amt)}</span>
    </div>`).join('');
}

/* ---------- init ---------- */
document.getElementById('f-date').value=today();
document.getElementById('f-time').value=nowTime();
renderCats();
</script>
</body>
</html>
